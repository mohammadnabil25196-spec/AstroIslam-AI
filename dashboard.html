<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstroIslam AI</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --accent: #f59e0b; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: sans-serif; }
        #sidebar { width: 260px; background: var(--sidebar); padding: 20px; border-right: 1px solid #1e293b; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { width: 100%; padding: 12px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; cursor: pointer; text-align: left; }
        #main { flex: 1; display: flex; flex-direction: column; }
        .view { flex: 1; padding: 40px; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #chat-view { display: flex; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background: var(--bg); color: white; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="sidebar">
        <button class="nav-btn" onclick="document.getElementById('modal').style.display='flex'">+ New Chat</button>
        <button class="nav-btn" onclick="showView('chat-view')">📜 History</button>
        <button class="nav-btn" style="margin-top: auto;" onclick="showView('admin-view')">⚙️ Admin Panel</button>
    </div>

    <div id="main">
        <div id="chat-view" class="view">
            <h1 id="chat-title">AstroIslam AI</h1>
            <p id="chat-status">Hello! I am AstroIslam AI. How can I assist you today?</p>
        </div>
        <div id="admin-view" class="view">
            <h1>Admin Dashboard</h1>
            <p>System logs and configurations.</p>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2>Start New Chat</h2>
            <select id="topic"><option>Cosmology</option><option>Islam</option><option>Scientific Reason</option></select>
            <select id="mode"><option>Simple (Short)</option><option>Extended (Detailed)</option></select>
            <button class="nav-btn" style="text-align:center; background:#f59e0b; color:black; font-weight:bold;" onclick="startChat()">Start Chat</button>
        </div>
    </div>

    <script>
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(viewId).style.display = 'flex';
        }
        function startChat() {
            const topic = document.getElementById('topic').value;
            const mode = document.getElementById('mode').value;
            document.getElementById('chat-title').innerText = topic + " (" + mode + ")";
            document.getElementById('chat-status').innerText = "Chat initialized. Ready for backend...";
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
