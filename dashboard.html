<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #001f3f; color: #FFD700; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #002b55; padding: 10px; border-radius: 10px; border: 1px solid #FFD700; width: fit-content; max-width: 80%; }
        #input-area { padding: 20px; background: #001f3f; display: flex; gap: 10px; border-top: 1px solid #FFD700; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #FFD700; background: #001f3f; color: white; }
        button { padding: 12px 20px; background: #FFD700; border: none; border-radius: 8px; color: #001f3f; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div class="msg">नमस्ते! मैं AstroIslam AI हूँ, मैं आपकी क्या मदद कर सकता हूँ?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="यहाँ टाइप करें...">
        <button onclick="sendMessage()">भेजें</button>
    </div>
    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            if (!input.value) return;
            const chat = document.getElementById('chat-window');
            chat.innerHTML += `<div class="msg" style="align-self: flex-end; background:#003a70;">${input.value}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
