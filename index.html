<!DOCTYPE html>
<html>
<body>
    <h2>AstroIslam AI</h2>
    <input type="text" id="email" placeholder="Apna Email daalo...">
    <input type="text" id="question" placeholder="Sawal pucho...">
    <button onclick="askAI()">Send</button>
    <div id="response"></div>

    <script>
        async function askAI() {
            const email = document.getElementById('email').value;
            const question = document.getElementById('question').value;
            const resDiv = document.getElementById('response');
            resDiv.innerText = "Soch raha hoon...";
            
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, question, lang: "Hinglish"})
            });
            const data = await response.json();
            resDiv.innerText = data.response || data.error;
        }
    </script>
</body>
</html>
