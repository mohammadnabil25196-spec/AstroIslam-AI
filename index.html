<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 10px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; background: #2c2c2c; border: none; color: white; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #00ff88; border: none; cursor: pointer; color: black; font-weight: bold; border-radius: 5px; }
</style>
</head>
<body>
<div class="container">
    <h2>AstroIslam AI Login</h2>
    <input type="email" id="email" placeholder="Email...">
    <input type="password" id="pass" placeholder="Password...">
    <button onclick="login()">Login</button>
    <div id="response" style="margin-top:20px;"></div>
</div>
<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const res = await fetch('/api/login', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if(data.success) {
            alert("Success! Welcome Admin.");
            window.location.reload(); 
        } else { 
            alert(data.error); 
        }
    }
</script>
</body>
</html>
