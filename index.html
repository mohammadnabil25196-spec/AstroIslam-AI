<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstroIslam AI</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --accent: #f59e0b; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: white; font-family: sans-serif; }
        #sidebar { width: 260px; background: var(--sidebar); padding: 20px; border-right: 1px solid #1e293b; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { width: 100%; padding: 12px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; cursor: pointer; text-align: left; }
        
        #main { flex: 1; display: flex; flex-direction: column; }
        .view { flex: 1; display: none; flex-direction: column; }
        #chat-view { display: flex; }
        
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; }
        #input-area { padding: 20px; border-top: 1px solid #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 5px; }
        
        #admin-view { padding: 40px; align-items: center; justify-content: center; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
    </style>
</head>
<body>
    <div id="sidebar">
        <button class="nav-btn" onclick="document.getElementById('modal').style.display='flex'">+ New Chat</button>
        <button class="nav-btn" onclick="showView('chat-view')">📜 History</button>
        <button class="nav-btn" style="margin-top: auto;" onclick="showView('admin-view')">⚙️ Admin Panel</button>
    </div>

    <div id="main">
        <div id="chat-view" class="view">
            <div id="chat-window">
                <h1 id="chat-title">AstroIslam AI</h1>
                <p id="chat-status">Select a topic to start.</p>
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type your message...">
                <button class="nav-btn" style="width: 80px;" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="admin-view" class="view">
            <h1>Admin Dashboard</h1>
            <button class="nav-btn" style="width: 200px;" onclick="showView('chat-view')">← Back to Chat</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2>Start New Chat</h2>
            <select id="topic" style="width: 100%; padding: 10px; margin: 10px 0;"><option>Cosmology</option><option>Islam</option></select>
            <button class="nav-btn" style="text-align:center; background:#f59e0b; color:black;" onclick="startChat()">Start Chat</button>
        </div>
    </div>

    <script>
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(viewId).style.display = (viewId === 'chat-view') ? 'flex' : 'block';
        }
        function startChat() {
            document.getElementById('chat-title').innerText = document.getElementById('topic').value;
            document.getElementById('chat-status').innerText = "Chat initialized.";
            document.getElementById('modal').style.display = 'none';
            showView('chat-view');
        }
        function sendMessage() { alert("Backend integration pending!"); }
    </script>
</body>
</html>
